name: CI

on:
  pull_request:
    paths:
      - 'front/**'
      - 'extension/**'

jobs:
  front:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # 가드: front 미스캐폴드면 이후 스텝 전부 skip → 빈 레포에서 머지 막지 않음
      - id: guard
        run: |
          if [ -f front/package.json ]; then echo "ready=true" >> "$GITHUB_OUTPUT";
          else echo "ready=false" >> "$GITHUB_OUTPUT"; echo "front 미스캐폴드 — CI skip"; fi
      - if: steps.guard.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: front/package-lock.json
      - if: steps.guard.outputs.ready == 'true'
        working-directory: front
        run: npm ci
      - if: steps.guard.outputs.ready == 'true'
        working-directory: front
        run: npm run lint
      - if: steps.guard.outputs.ready == 'true'
        working-directory: front
        run: npm run typecheck --if-present
      - if: steps.guard.outputs.ready == 'true'
        working-directory: front
        run: npx vitest run --coverage
      - if: steps.guard.outputs.ready == 'true'
        working-directory: front
        run: npm run build

  extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: guard
        run: |
          if [ -f extension/package.json ]; then echo "ready=true" >> "$GITHUB_OUTPUT";
          else echo "ready=false" >> "$GITHUB_OUTPUT"; echo "extension 미스캐폴드 — CI skip"; fi
      - if: steps.guard.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: extension/package-lock.json
      - if: steps.guard.outputs.ready == 'true'
        working-directory: extension
        run: npm ci
      - if: steps.guard.outputs.ready == 'true'
        working-directory: extension
        run: npm run lint
      - if: steps.guard.outputs.ready == 'true'
        working-directory: extension
        run: npm run test --if-present

name: CI

on:
  pull_request:
    paths:
      - 'front/**'
      - 'extension/**'
      - '.github/workflows/ci.yml'

jobs:
  front:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # 가드: front 미스캐폴드면 이후 스텝 전부 skip → 빈 레포에서 머지 막지 않음
      - id: guard
        run: |
          if [ -f front/package.json ]; then echo "ready=true" >> "$GITHUB_OUTPUT";
          else echo "ready=false" >> "$GITHUB_OUTPUT"; echo "front 미스캐폴드 — CI skip"; fi
      - if: steps.guard.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: front/package-lock.json
      - if: steps.guard.outputs.ready == 'true'
        working-directory: front
        run: npm ci
      - if: steps.guard.outputs.ready == 'true'
        working-directory: front
        run: npm run lint
      - if: steps.guard.outputs.ready == 'true'
        working-directory: front
        run: npm run typecheck --if-present
      - if: steps.guard.outputs.ready == 'true'
        working-directory: front
        run: npx vitest run --coverage
      - if: steps.guard.outputs.ready == 'true'
        working-directory: front
        run: npm run build

  extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: guard
        run: |
          if [ -f extension/package.json ]; then echo "ready=true" >> "$GITHUB_OUTPUT";
          else echo "ready=false" >> "$GITHUB_OUTPUT"; echo "extension 미스캐폴드 — CI skip"; fi
      - if: steps.guard.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: extension/package-lock.json
      - if: steps.guard.outputs.ready == 'true'
        working-directory: extension
        run: npm ci
      - if: steps.guard.outputs.ready == 'true'
        working-directory: extension
        run: npm run lint
      - if: steps.guard.outputs.ready == 'true'
        working-directory: extension
        run: npm run test --if-present

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: guard
        run: |
          if [ -f front/package.json ]; then echo "ready=true" >> "$GITHUB_OUTPUT";
          else echo "ready=false" >> "$GITHUB_OUTPUT"; echo "front 미스캐폴드 — e2e skip"; fi
      - if: steps.guard.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: front/package-lock.json
      - if: steps.guard.outputs.ready == 'true'
        working-directory: front
        run: npm ci
      - if: steps.guard.outputs.ready == 'true'
        working-directory: front
        run: npx playwright install --with-deps chromium
      # 공개 페이지 e2e만 게이트 — 비로그인 getUser()는 null 반환, 더미 Supabase env로 충분(시크릿 불필요)
      - if: steps.guard.outputs.ready == 'true'
        working-directory: front
        run: npm run test:e2e
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      - if: ${{ steps.guard.outputs.ready == 'true' && failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: front/playwright-report/
          retention-days: 7

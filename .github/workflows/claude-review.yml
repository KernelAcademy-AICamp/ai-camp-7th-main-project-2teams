name: Claude Review

# 팀 설정 필요:
#   1. 저장소 Secrets에 ANTHROPIC_API_KEY 등록
#   2. Anthropic GitHub App 설치 (https://github.com/apps/claude)
# 미설정 시 이 워크플로는 실패하나 CI(ci.yml) 머지 게이트와 무관.

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    if: ${{ vars.CLAUDE_REVIEW_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            이 PR diff를 .claude/agents/code-reviewer.md 와 .claude/agents/security-auditor.md
            기준으로 리뷰하라. 보안 3종(.claude/rules/security.md) 위반은 🚨로 표시.
            리뷰는 한국어. 위반 발견 시 파일:라인 + 수정안 제시.

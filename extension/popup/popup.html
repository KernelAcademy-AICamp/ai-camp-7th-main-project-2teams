<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mowaba</title>
    <style>
      body { width: 320px; min-height: 140px; margin: 0; font-family: sans-serif; padding: 16px; box-sizing: border-box; }
      #status { font-size: 14px; color: #6b7280; margin-bottom: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      #action { display: flex; flex-direction: column; gap: 8px; }
      #action button {
        width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px;
        background: #fff; font-size: 14px; cursor: pointer;
      }
      #action button:hover:not(:disabled) { background: #f9fafb; }
      #action button:disabled { opacity: 0.6; cursor: default; }
      #action button.danger { border-color: #fca5a5; color: #dc2626; }
      #action button.danger:hover:not(:disabled) { background: #fef2f2; }

      #toast {
        margin-top: 12px; padding: 10px 12px; border-radius: 6px;
        font-size: 13px; line-height: 1.5;
      }
      #toast.loading { background: #f3f4f6; color: #374151; }
      #toast.success { background: #f0fdf4; border: 1px solid #86efac; color: #166534; }
      #toast.error   { background: #fef2f2; border: 1px solid #fca5a5; color: #991b1b; }
      #toast.duplicate { background: #fffbeb; border: 1px solid #fcd34d; color: #92400e; }

      .toast-tags { margin-top: 4px; font-size: 12px; color: #4b7c62; }
      .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid #d1d5db; border-top-color: #6b7280; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="status">로딩 중...</div>
    <div id="action"></div>
    <div id="toast" hidden></div>
    <script src="../dist/popup.js" type="module"></script>
  </body>
</html>
